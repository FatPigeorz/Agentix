name: test

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e '.[dev]'
      - name: lint
        run: ruff check agentix/ tests/ primitives/
      - name: stub ↔ impl signature drift
        run: agentix check primitives/
      - name: unit tests
        run: pytest tests/ -v

  # The end-to-end Docker job was retired alongside `tests/smoke_docker.py`
  # (which used the pre-typed-dispatch reverse-proxy API). The unit job's
  # `live_server` fixture already exercises a real uvicorn + Socket.IO
  # round trip; a Docker-level e2e harness gets re-added once we have a
  # closure that genuinely depends on the Docker deployment path.
